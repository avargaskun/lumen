name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Test
        run: make test

      - name: Script tests
        run: bash scripts/test_run.sh

      - name: Vet
        run: go vet -tags=fts5 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          args: --build-tags=fts5

  e2e:
    name: E2E
    runs-on: ubuntu-latest
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Wait for Ollama
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:11434/ && break
            sleep 1
          done

      - name: Pull embedding model
        run:
          'curl -sf http://localhost:11434/api/pull -d ''{"name":"all-minilm"}'''

      - name: E2E tests
        run: make e2e
        env:
          OLLAMA_HOST: http://localhost:11434
          LUMEN_EMBED_MODEL: all-minilm
          LUMEN_EMBED_DIMS: '384'

